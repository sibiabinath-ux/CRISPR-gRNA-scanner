<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRISPR gRNA Scanner</title>

<style>
body {
  background:#0b0b0f;
  color:#e5e7eb;
  font-family:Arial;
  text-align:center;
}

h2 { color:#a78bfa; }

textarea {
  background:#111827;
  color:#e5e7eb;
  border:1px solid #374151;
  padding:12px;
  border-radius:10px;
  width:80%;
}

button {
  background:#6366f1;
  color:white;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  margin:10px;
  cursor:pointer;
}

#output {
  margin-top:20px;
  padding:10px;
  background:#111827;
  border-radius:10px;
  width:80%;
  margin-left:auto;
  margin-right:auto;
}
</style>
</head>

<body>

<h2>🧬 CRISPR gRNA Scanner</h2>

<p style="color:#9ca3af;">Enter DNA sequence (≥ 23 nt)</p>

<textarea id="seqInput" rows="5" placeholder="Paste DNA sequence"></textarea><br>

<button onclick="analyze()">Analyze</button>

<div id="output">Result will appear here</div>

<script>

function analyze(){

  const input = document.getElementById("seqInput").value.toUpperCase();
  const output = document.getElementById("output");

  if(input.length < 23){
    alert("Enter at least 23 nt");
    return;
  }

  output.innerHTML = "Analyzing...";

  fetch("https://crispr-backend.onrender.com/api/analyze", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      sequence: input
    })
  })
  .then(res => res.json())
  .then(data => {

    output.innerHTML = `
      <p><b>Status:</b> ${data.message}</p>
      <p><b>Sequence Length:</b> ${data.length}</p>
    `;
  })
  .catch(err => {
    output.innerHTML = "Error connecting to backend ❌";
    console.error(err);
  });
}

</script>

</body>
</html>
