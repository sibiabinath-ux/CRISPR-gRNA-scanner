<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRISPR gRNA Scanner</title>

<style>
body {
  background: #05070d;
  color: #e5e7eb;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

h2 { color: #8b5cf6; }

textarea {
  background: #0f172a;
  color: #e5e7eb;
  border: 1px solid #334155;
  padding: 15px;
  border-radius: 12px;
  width: 80%;
  font-family: monospace;
}

button {
  background: linear-gradient(45deg,#6366f1,#8b5cf6);
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  margin: 15px;
  cursor: pointer;
}

#output {
  margin-top: 20px;
  padding: 20px;
  background: #0f172a;
  border-radius: 12px;
  width: 85%;
  margin: auto;
}

.card {
  background: #020617;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

.best {
  border: 1px solid #22c55e;
  background: #052e1b;
}

.safe { color: #22c55e; }
.medium { color: #f59e0b; }
.high { color: #ef4444; }

.seq {
  font-family: monospace;
}
</style>
</head>

<body>

<h2>🧬 CRISPR gRNA Scanner</h2>
<p>Off-target aware analysis</p>

<textarea id="seqInput" rows="5"></textarea><br>
<button onclick="analyze()">Analyze</button>

<div id="output">Results will appear here</div>

<script>

function getRiskClass(risk){
  if(risk==="SAFE") return "safe";
  if(risk==="MEDIUM") return "medium";
  return "high";
}

function analyze(){

  const input = document.getElementById("seqInput").value.toUpperCase();
  const output = document.getElementById("output");

  if(input.length < 23){
    alert("Enter at least 23 nt");
    return;
  }

  output.innerHTML = "🧠 Running off-target analysis...";

  fetch("https://crispr-backend.onrender.com/api/analyze", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ sequence: input })
  })
  .then(res => res.json())
  .then(data => {

    if(data.error){
      output.innerHTML = data.error;
      return;
    }

    if(data.count === 0){
      output.innerHTML = "No valid gRNA found";
      return;
    }

    let html = "";

    // BEST
    if(data.best){
      html += `
        <div class="card best">
          <h3>🎯 Best gRNA</h3>
          <div class="seq">${data.best.sequence}</div>
          <p>
            Score: ${data.best.score} |
            GC: ${data.best.gc}% |
            <span class="${getRiskClass(data.best.risk)}">${data.best.risk}</span> |
            Pos: ${data.best.position}
          </p>
        </div>
      `;
    }

    html += `<h3>Top gRNAs</h3>`;

    data.top.forEach((g, i) => {
      html += `
        <div class="card">
          <b>#${i+1}</b>
          <div class="seq">${g.sequence}</div>
          <p>
            Score: ${g.score} |
            GC: ${g.gc}% |
            <span class="${getRiskClass(g.risk)}">${g.risk}</span> |
            Pos: ${g.position}
          </p>
        </div>
      `;
    });

    output.innerHTML = html;
  })
  .catch(err => {
    output.innerHTML = "Backend error ❌";
    console.error(err);
  });
}

</script>

</body>
</html>
