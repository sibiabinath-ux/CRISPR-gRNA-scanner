<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRISPR Scanner</title>

<style>

body{
  background:#030712;
  color:#e5e7eb;
  font-family:Segoe UI;
  text-align:center;
}

h2{color:#8b5cf6}

/* FAKE TEXTAREA */
#editor{
  width:80%;
  min-height:120px;
  margin:auto;
  padding:15px;
  background:#0f172a;
  border-radius:10px;
  font-family:monospace;
  color:white;
  text-align:left;
  outline:none;
  white-space:pre-wrap;
  word-break:break-word;
}

/* BUTTON */
button{
  margin:10px;
  padding:10px 20px;
  background:linear-gradient(45deg,#6366f1,#8b5cf6);
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* CARDS */
.card{
  background:#020617;
  padding:10px;
  margin:10px;
  border-radius:8px;
  cursor:pointer;
}

.card:hover{background:#111827}

/* HIGHLIGHT */
.highlight{
  background:#22c55e;
  color:black;
  border-radius:4px;
  box-shadow:0 0 12px #22c55e;
  padding:2px;
}

</style>
</head>

<body>

<h2>🧬 CRISPR gRNA Scanner</h2>

<input type="file" id="fileInput"><br><br>

<div id="editor" contenteditable="true">
Paste DNA sequence here...
</div>

<br>

<button onclick="analyze()">Analyze</button>

<div id="output"></div>

<script>

let rawSequence = "";
let results = [];


// FASTA UPLOAD
document.getElementById("fileInput").addEventListener("change", function(e){

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event){

    let text = event.target.result;

    text = text.replace(/^>.*$/gm,"");
    text = text.replace(/[^ATCG]/gi,"");

    document.getElementById("editor").innerText = text;
  };

  reader.readAsText(file);
});


// GET CLEAN TEXT
function getSequence(){
  return document.getElementById("editor").innerText
    .toUpperCase()
    .replace(/[^ATCG]/g,"");
}


// ANALYZE
function analyze(){

  const seq = getSequence();

  if(seq.length < 23){
    alert("Enter ≥ 23 nt");
    return;
  }

  rawSequence = seq;

  fetch("https://crispr-backend.onrender.com/api/analyze",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({sequence:seq})
  })
  .then(res=>res.json())
  .then(data=>{

    results = data.top;

    let html = "<h3>Top gRNAs</h3>";

    data.top.forEach(g=>{
      html += `
      <div class="card" onclick="highlight(${g.position})">
        ${g.sequence}<br>
        Score: ${g.score} | GC: ${g.gc}%
      </div>`;
    });

    document.getElementById("output").innerHTML = html;
  });
}


// 🔥 MAIN FEATURE: HIGHLIGHT IN TOP EDITOR
function highlight(pos){

  const len = 23;

  const before = rawSequence.slice(0,pos);
  const target = rawSequence.slice(pos,pos+len);
  const after = rawSequence.slice(pos+len);

  const html =
    before +
    `<span class="highlight">${target}</span>` +
    after;

  document.getElementById("editor").innerHTML = html;

  // scroll into view
  setTimeout(()=>{
    document.querySelector(".highlight")?.scrollIntoView({
      behavior:"smooth",
      block:"center"
    });
  },100);
}

</script>

</body>
</html>
