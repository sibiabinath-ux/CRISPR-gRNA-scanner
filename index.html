<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRISPR gRNA Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: #05070d;
  color: #e5e7eb;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

h2 { color: #8b5cf6; }

textarea {
  background: #0f172a;
  color: #e5e7eb;
  border: 1px solid #334155;
  padding: 15px;
  border-radius: 12px;
  width: 80%;
  font-family: monospace;
}

select {
  padding: 10px;
  border-radius: 8px;
  margin: 10px;
  background: #0f172a;
  color: white;
}

button {
  background: linear-gradient(45deg,#6366f1,#8b5cf6);
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  margin: 15px;
  cursor: pointer;
}

#output {
  margin-top: 20px;
  padding: 20px;
  background: #0f172a;
  border-radius: 12px;
  width: 90%;
  margin: auto;
}

.card {
  background: #020617;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.best {
  border: 1px solid #22c55e;
  background: #052e1b;
}
</style>
</head>

<body>

<h2>🧬 CRISPR gRNA Scanner</h2>

<textarea id="seqInput" rows="5"></textarea><br>

<select id="pamSelect">
  <option value="NGG">NGG (SpCas9)</option>
  <option value="TTTV">TTTV (Cas12a)</option>
  <option value="NAG">NAG (Alternative)</option>
</select>

<br>
<button onclick="analyze()">Analyze</button>

<div id="output">Results will appear here</div>

<script>

function analyze(){

  const input = document.getElementById("seqInput").value.toUpperCase();
  const pam = document.getElementById("pamSelect").value;
  const output = document.getElementById("output");

  if(input.length < 23){
    alert("Enter at least 23 nt");
    return;
  }

  output.innerHTML = "🧠 Running analysis...";

  fetch("https://crispr-backend.onrender.com/api/analyze", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      sequence: input,
      pam: pam
    })
  })
  .then(res => res.json())
  .then(data => {

    if(data.error){
      output.innerHTML = data.error;
      return;
    }

    let html = `<h3>Top gRNAs (${pam})</h3>`;

    data.top.forEach((g, i) => {
      html += `
        <div class="card">
          #${i+1} ${g.sequence}<br>
          Score: ${g.score} | GC: ${g.gc}% | ${g.risk}
        </div>
      `;
    });

    output.innerHTML = html;
  });

}

</script>

</body>
</html>
