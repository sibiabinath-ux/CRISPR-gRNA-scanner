<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRISPR gRNA Scanner</title>

<style>
body {
  background: #05070d;
  color: #e5e7eb;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

h2 { color: #8b5cf6; }

textarea {
  width: 80%;
  padding: 15px;
  background: #0f172a;
  color: white;
  border-radius: 10px;
  font-family: monospace;
}

input[type="file"] {
  margin: 10px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  background: linear-gradient(45deg,#6366f1,#8b5cf6);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.card {
  background: #020617;
  padding: 12px;
  margin: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.card:hover {
  background: #111827;
}

.best {
  border: 1px solid #22c55e;
  background: #052e1b;
}

.highlight {
  background: #22c55e;
  color: black;
  font-weight: bold;
}

#genome {
  margin-top: 20px;
  padding: 10px;
  background: #020617;
  border-radius: 8px;
  word-wrap: break-word;
  font-family: monospace;
}

.loader {
  border: 5px solid #1f2937;
  border-top: 5px solid #8b5cf6;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  margin: auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}
</style>
</head>

<body>

<h2>🧬 CRISPR gRNA Scanner</h2>

<p>Paste DNA OR upload FASTA</p>

<input type="file" id="fileInput" accept=".fasta,.fa,.txt"><br>

<textarea id="seqInput" rows="5"></textarea><br>

<select id="pamSelect">
  <option value="NGG">NGG (SpCas9)</option>
  <option value="TTTV">TTTV (Cas12a)</option>
</select>

<br>
<button onclick="analyze()">Analyze</button>
<button onclick="downloadCSV()">Download CSV</button>

<div id="output"></div>

<div id="genome"></div>

<script>

let fullSequence = "";
let allResults = [];

// 📁 FASTA UPLOAD
document.getElementById("fileInput").addEventListener("change", function(e){

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){

    let text = event.target.result;

    // remove headers
    text = text.replace(/^>.*$/gm, "");

    // remove non DNA
    text = text.replace(/[^ATCG]/gi, "");

    document.getElementById("seqInput").value = text;
  };

  reader.readAsText(file);
});


// 🎯 HIGHLIGHT FUNCTION
function highlightGuide(pos, length){

  const before = fullSequence.slice(0, pos);
  const target = fullSequence.slice(pos, pos + length);
  const after = fullSequence.slice(pos + length);

  document.getElementById("genome").innerHTML =
    before +
    `<span class="highlight">${target}</span>` +
    after;
}


// 🚀 ANALYZE
function analyze(){

  const seq = document.getElementById("seqInput").value.toUpperCase();
  const pam = document.getElementById("pamSelect").value;
  const output = document.getElementById("output");

  if(seq.length < 23){
    alert("Enter at least 23 nt");
    return;
  }

  fullSequence = seq;

  output.innerHTML = `<div class="loader"></div><p>Analyzing...</p>`;

  fetch("https://crispr-backend.onrender.com/api/analyze", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({sequence: seq, pam: pam})
  })
  .then(res=>res.json())
  .then(data=>{

    allResults = data.all;

    let html = "";

    if(data.best){
      html += `
      <div class="card best" onclick="highlightGuide(${data.best.position},23)">
        <b>🎯 Best Guide</b><br>
        ${data.best.sequence}<br>
        Score: ${data.best.score} | GC: ${data.best.gc}% | ${data.best.risk} | Strand: ${data.best.strand}
      </div>`;
    }

    html += `<h3>Top gRNAs (click to highlight)</h3>`;

    data.top.forEach(g=>{
      html += `
      <div class="card" onclick="highlightGuide(${g.position},23)">
        ${g.sequence}<br>
        Score: ${g.score} | GC: ${g.gc}% | ${g.risk} | Strand: ${g.strand}
      </div>`;
    });

    output.innerHTML = html;

    document.getElementById("genome").innerHTML = seq;

  })
  .catch(err=>{
    output.innerHTML = "Backend error ❌";
  });
}


// 📊 CSV EXPORT
function downloadCSV(){

  let csv = "Sequence,Score,GC,Risk,Strand,Position\n";

  allResults.forEach(g=>{
    csv += `${g.sequence},${g.score},${g.gc},${g.risk},${g.strand},${g.position}\n`;
  });

  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "grna_results.csv";
  a.click();
}

</script>

</body>
</html>
