<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRISPR gRNA Scanner</title>

<style>
body {
  background:#0b0b0f;
  color:#e5e7eb;
  font-family:Arial;
  text-align:center;
}

h2 {
  color:#a78bfa;
}

textarea {
  background:#111827;
  color:#e5e7eb;
  border:1px solid #374151;
  padding:12px;
  border-radius:10px;
  width:80%;
}

button {
  background:#6366f1;
  color:white;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  margin:10px;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  background:#4f46e5;
}

button:active {
  transform: scale(0.95);
}

#output {
  margin-top:20px;
  padding:15px;
  background:#111827;
  border-radius:10px;
  width:80%;
  margin-left:auto;
  margin-right:auto;
}

.card {
  background:#1f2937;
  padding:10px;
  margin:10px;
  border-radius:8px;
}

.best {
  border:1px solid #22c55e;
}
</style>
</head>

<body>

<h2>🧬 CRISPR gRNA Scanner</h2>

<p style="color:#9ca3af;">Enter DNA sequence (≥ 23 nt)</p>

<textarea id="seqInput" rows="5" placeholder="Paste DNA sequence..."></textarea><br>

<button onclick="analyze()">Analyze</button>

<div id="output">Result will appear here</div>

<script>

function analyze(){

  const input = document.getElementById("seqInput").value.toUpperCase();
  const output = document.getElementById("output");

  if(input.length < 23){
    alert("Enter at least 23 nt");
    return;
  }

  output.innerHTML = "Analyzing...";

  fetch("https://crispr-backend.onrender.com/api/analyze", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      sequence: input
    })
  })
  .then(res => res.json())
  .then(data => {

    if(data.error){
      output.innerHTML = data.error;
      return;
    }

    if(data.count === 0){
      output.innerHTML = "No valid gRNA found";
      return;
    }

    let html = "";

    // ⭐ BEST GUIDE
    if(data.best){
      html += `
        <div class="card best">
          <h3 style="color:#22c55e;">🎯 Best gRNA</h3>
          <p><b>${data.best.sequence}</b></p>
          <p>Score: ${data.best.score} | GC: ${data.best.gc}% | Position: ${data.best.position}</p>
        </div>
      `;
    }

    html += `<h3>Top gRNAs</h3>`;

    data.top.forEach((g, i) => {
      html += `
        <div class="card">
          <b>#${i+1}</b> ${g.sequence}<br>
          Score: ${g.score} | GC: ${g.gc}% | Position: ${g.position}
        </div>
      `;
    });

    output.innerHTML = html;
  })
  .catch(err => {
    output.innerHTML = "Error connecting to backend ❌";
    console.error(err);
  });
}

</script>

</body>
</html>
