<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRISPR gRNA Scanner</title>

<style>
body {
  background: #030712;
  color: #e5e7eb;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

h2 {
  color: #8b5cf6;
}

/* INPUT */
textarea {
  width: 80%;
  padding: 15px;
  background: #0f172a;
  color: white;
  border-radius: 10px;
  font-family: monospace;
}

/* BUTTON */
button {
  padding: 10px 20px;
  margin: 10px;
  background: linear-gradient(45deg,#6366f1,#8b5cf6);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* CARDS */
.card {
  background: #020617;
  padding: 12px;
  margin: 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
  background: #111827;
}

.best {
  border: 1px solid #22c55e;
  background: #052e1b;
}

/* GENOME VIEW */
#genome {
  margin-top: 20px;
  padding: 15px;
  background: #020617;
  border-radius: 10px;
  font-family: monospace;
  text-align: left;
  line-height: 1.6;
  word-wrap: break-word;
}

/* HIGHLIGHT */
.highlight-plus {
  background: #22c55e;
  color: black;
  font-weight: bold;
  box-shadow: 0 0 10px #22c55e;
}

.highlight-minus {
  background: #a855f7;
  color: black;
  font-weight: bold;
  box-shadow: 0 0 10px #a855f7;
}

/* LOADER */
.loader {
  border: 5px solid #1f2937;
  border-top: 5px solid #8b5cf6;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  margin: auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}
</style>
</head>

<body>

<h2>🧬 CRISPR gRNA Scanner</h2>

<input type="file" id="fileInput" accept=".fasta,.fa,.txt"><br>

<textarea id="seqInput" rows="5"></textarea><br>

<select id="pamSelect">
  <option value="NGG">NGG (SpCas9)</option>
  <option value="TTTV">TTTV (Cas12a)</option>
</select>

<br>
<button onclick="analyze()">Analyze</button>
<button onclick="downloadCSV()">Download CSV</button>

<div id="output"></div>
<div id="genome"></div>

<script>

let fullSequence = "";
let allResults = [];

// FASTA
document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event){
    let text = event.target.result;
    text = text.replace(/^>.*$/gm, "");
    text = text.replace(/[^ATCG]/gi, "");
    document.getElementById("seqInput").value = text;
  };

  reader.readAsText(file);
});


// 🧬 FORMAT GENOME (LINE WRAP)
function formatGenome(seq){
  let formatted = "";
  for(let i=0;i<seq.length;i+=80){
    formatted += seq.slice(i,i+80) + "<br>";
  }
  return formatted;
}


// 🎯 HIGHLIGHT WITH STRAND COLOR
function highlightGuide(pos, strand){

  const len = 23;

  const before = fullSequence.slice(0, pos);
  const target = fullSequence.slice(pos, pos + len);
  const after = fullSequence.slice(pos + len);

  const cls = strand === "+" ? "highlight-plus" : "highlight-minus";

  document.getElementById("genome").innerHTML =
    formatGenome(
      before +
      `<span class="${cls}">${target}</span>` +
      after
    );
}


// ANALYZE
function analyze(){

  const seq = document.getElementById("seqInput").value.toUpperCase();
  const pam = document.getElementById("pamSelect").value;
  const output = document.getElementById("output");

  if(seq.length < 23){
    alert("Enter at least 23 nt");
    return;
  }

  fullSequence = seq;

  output.innerHTML = `<div class="loader"></div><p>Analyzing...</p>`;

  fetch("https://crispr-backend.onrender.com/api/analyze", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({sequence: seq, pam: pam})
  })
  .then(res=>res.json())
  .then(data=>{

    allResults = data.all;

    let html = "";

    if(data.best){
      html += `
      <div class="card best" onclick="highlightGuide(${data.best.position}, '${data.best.strand}')">
        🎯 Best Guide<br>
        ${data.best.sequence}<br>
        Score: ${data.best.score} | GC: ${data.best.gc}% | ${data.best.risk} | Strand: ${data.best.strand}
      </div>`;
    }

    html += `<h3>Top gRNAs</h3>`;

    data.top.forEach(g=>{
      html += `
      <div class="card" onclick="highlightGuide(${g.position}, '${g.strand}')">
        ${g.sequence}<br>
        Score: ${g.score} | GC: ${g.gc}% | ${g.risk} | Strand: ${g.strand}
      </div>`;
    });

    output.innerHTML = html;

    document.getElementById("genome").innerHTML = formatGenome(seq);

  });

}


// CSV
function downloadCSV(){

  let csv = "Sequence,Score,GC,Risk,Strand,Position\n";

  allResults.forEach(g=>{
    csv += `${g.sequence},${g.score},${g.gc},${g.risk},${g.strand},${g.position}\n`;
  });

  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "grna_results.csv";
  a.click();
}

</script>

</body>
</html>
