<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRISPR gRNA Scanner</title>

<style>
body {
  background: #05070d;
  color: #e5e7eb;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

textarea {
  width: 80%;
  padding: 12px;
  background: #0f172a;
  color: white;
  border-radius: 10px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  background: #6366f1;
  color: white;
  border: none;
  border-radius: 8px;
}

.card {
  background: #020617;
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
}

.best {
  border: 1px solid #22c55e;
  background: #052e1b;
}
</style>
</head>

<body>

<h2>🧬 CRISPR gRNA Scanner</h2>

<textarea id="seqInput"></textarea><br>

<select id="pamSelect">
  <option value="NGG">NGG</option>
  <option value="TTTV">TTTV</option>
</select>

<br>
<button onclick="analyze()">Analyze</button>
<button onclick="downloadCSV()">Download CSV</button>

<div id="output"></div>

<script>

let allResults = [];

function analyze(){

  const seq = document.getElementById("seqInput").value;
  const pam = document.getElementById("pamSelect").value;

  fetch("https://crispr-backend.onrender.com/api/analyze", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({sequence: seq, pam: pam})
  })
  .then(res=>res.json())
  .then(data=>{

    allResults = data.all;

    let html = "";

    if(data.best){
      html += `
      <div class="card best">
        <b>Best Guide</b><br>
        ${data.best.sequence}<br>
        Score: ${data.best.score} | GC: ${data.best.gc}% | ${data.best.risk} | Strand: ${data.best.strand}
      </div>`;
    }

    data.top.forEach(g=>{
      html += `
      <div class="card">
        ${g.sequence}<br>
        Score: ${g.score} | GC: ${g.gc}% | ${g.risk} | Strand: ${g.strand}
      </div>`;
    });

    document.getElementById("output").innerHTML = html;
  });
}


function downloadCSV(){

  let csv = "Sequence,Score,GC,Risk,Strand,Position\n";

  allResults.forEach(g=>{
    csv += `${g.sequence},${g.score},${g.gc},${g.risk},${g.strand},${g.position}\n`;
  });

  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "grna_results.csv";
  a.click();
}

</script>

</body>
</html>
