<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRISPR gRNA Scanner</title>

<style>
body {
  background: #030712;
  color: #e5e7eb;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

h2 { color: #8b5cf6; }

/* INPUT */
textarea {
  width: 80%;
  padding: 15px;
  background: #0f172a;
  color: white;
  border-radius: 10px;
  font-family: monospace;
}

/* BUTTON */
button {
  padding: 10px 20px;
  margin: 10px;
  background: linear-gradient(45deg,#6366f1,#8b5cf6);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* CARDS */
.card {
  background: #020617;
  padding: 12px;
  margin: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.card:hover {
  background: #111827;
}

.best {
  border: 1px solid #22c55e;
  background: #052e1b;
}

/* GENOME */
#genome {
  margin-top: 20px;
  padding: 15px;
  background: #020617;
  border-radius: 10px;
  font-family: monospace;
  text-align: left;
  line-height: 1.8;
  overflow-x: auto;
}

/* HIGHLIGHT */
.highlight-plus {
  background: #22c55e;
  color: black;
  border-radius: 4px;
  padding: 2px;
  box-shadow: 0 0 12px #22c55e;
}

.highlight-minus {
  background: #a855f7;
  color: black;
  border-radius: 4px;
  padding: 2px;
  box-shadow: 0 0 12px #a855f7;
}
</style>
</head>

<body>

<h2>🧬 CRISPR gRNA Scanner</h2>

<input type="file" id="fileInput"><br>

<textarea id="seqInput" rows="5"></textarea><br>

<select id="pamSelect">
  <option value="NGG">NGG (SpCas9)</option>
  <option value="TTTV">TTTV (Cas12a)</option>
</select>

<br>
<button onclick="analyze()">Analyze</button>
<button onclick="downloadCSV()">Download CSV</button>

<div id="output"></div>
<div id="genome"></div>

<script>

let fullSequence = "";
let allResults = [];

// FASTA LOAD
document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event){
    let text = event.target.result;
    text = text.replace(/^>.*$/gm, "");
    text = text.replace(/[^ATCG]/gi, "");
    document.getElementById("seqInput").value = text;
  };

  reader.readAsText(file);
});


// 🧬 SAFE TEXT RENDER (NO HTML BREAK)
function escapeHTML(str) {
  return str.replace(/</g, "&lt;").replace(/>/g, "&gt;");
}


// 🧬 FORMAT GENOME
function formatGenome(seq){
  let lines = [];
  for(let i=0;i<seq.length;i+=80){
    lines.push(seq.slice(i,i+80));
  }
  return lines.join("<br>");
}


// 🎯 FIXED HIGHLIGHT (NO STRING BREAK)
function highlightGuide(pos, strand){

  const len = 23;

  const before = escapeHTML(fullSequence.slice(0, pos));
  const target = escapeHTML(fullSequence.slice(pos, pos + len));
  const after = escapeHTML(fullSequence.slice(pos + len));

  const cls = strand === "+" ? "highlight-plus" : "highlight-minus";

  const html =
    before +
    `<span class="${cls}" id="target">${target}</span>` +
    after;

  document.getElementById("genome").innerHTML = formatGenome(html);

  // AUTO SCROLL
  setTimeout(()=>{
    document.getElementById("target")?.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });
  }, 100);
}


// ANALYZE
function analyze(){

  const seq = document.getElementById("seqInput").value.toUpperCase();
  const pam = document.getElementById("pamSelect").value;

  if(seq.length < 23){
    alert("Enter at least 23 nt");
    return;
  }

  fullSequence = seq;

  fetch("https://crispr-backend.onrender.com/api/analyze", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({sequence: seq, pam: pam})
  })
  .then(res=>res.json())
  .then(data=>{

    allResults = data.all;

    let html = "";

    if(data.best){
      html += `
      <div class="card best" onclick="highlightGuide(${data.best.position}, '${data.best.strand}')">
        🎯 Best Guide<br>
        ${data.best.sequence}<br>
        Score: ${data.best.score} | GC: ${data.best.gc}% | ${data.best.risk} | Strand: ${data.best.strand}
      </div>`;
    }

    html += `<h3>Top gRNAs</h3>`;

    data.top.forEach(g=>{
      html += `
      <div class="card" onclick="highlightGuide(${g.position}, '${g.strand}')">
        ${g.sequence}<br>
        Score: ${g.score} | GC: ${g.gc}% | ${g.risk} | Strand: ${g.strand}
      </div>`;
    });

    document.getElementById("output").innerHTML = html;
    document.getElementById("genome").innerHTML = formatGenome(seq);

  });
}


// CSV
function downloadCSV(){

  let csv = "Sequence,Score,GC,Risk,Strand,Position\n";

  allResults.forEach(g=>{
    csv += `${g.sequence},${g.score},${g.gc},${g.risk},${g.strand},${g.position}\n`;
  });

  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "grna_results.csv";
  a.click();
}

</script>

</body>
</html>
